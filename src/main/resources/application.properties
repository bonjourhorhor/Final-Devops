spring.application.name=id-card-manager

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/id_card_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# File Upload Configuration (Max 5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Custom File Upload Configuration
app.file.upload-dir=uploads/photos
app.file.max-file-size=5242880
app.file.allowed-mime-types=image/jpeg,image/png
app.file.allowed-extensions=jpg,jpeg,png

# Storage Type (local or s3)
app.storage.type=local