apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-db
  labels:
    app: mysql-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-db
  template:
    metadata:
      labels:
        app: mysql-db
    spec:
      containers:
        - name: mysql-db
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "Hello@123"
            - name: MYSQL_DATABASE
              value: "I4B-LUY_Lyhor-db"
          ports:
            - containerPort: 3306

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-db
spec:
  selector:
    app: mysql-db
  ports:
    - port: 3306
      targetPort: 3306

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
  labels:
    app: web-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-server
  template:
    metadata:
      labels:
        app: web-server
    spec:
      containers:
        - name: web-server
          image: web-server:latest # This requires building the image and pushing to a registry or building locally
          imagePullPolicy: Never
          env:
            - name: DB_HOST
              value: "mysql-db"
            - name: DB_NAME
              value: "I4B-LUY_Lyhor-db"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "Hello@123"
          ports:
            - containerPort: 8080
            - containerPort: 2222

---
apiVersion: v1
kind: Service
metadata:
  name: web-server-service
spec:
  type: NodePort
  selector:
    app: web-server
  ports:
    - name: http
      port: 8443
      targetPort: 8080
      nodePort: 30443
    - name: ssh
      port: 2222
      targetPort: 2222
      nodePort: 30222
