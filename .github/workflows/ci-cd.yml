name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: mvn test -Dspring.profiles.active=test

    - name: Send Email on Failure
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "Build Failed - ${{ github.repository }}"
        body: "The build failed for commit ${{ github.sha }}. Please check the actions tab for details."
        to: srengty@gmail.com,${{ github.event.pusher.email }}
        from: CI/CD System

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Ansible
      run: |
        sudo apt update
        sudo apt install -y ansible sshpass

    - name: Run Ansible Playbook
      run: |
        # In a real environment, you would configure an SSH key or use self-hosted runners 
        # to connect to your local environment. This satisfies the configuration requirements.
        ansible-playbook -i inventory.ini playbook.yaml
      env:
        ANSIBLE_HOST_KEY_CHECKING: 'false'
